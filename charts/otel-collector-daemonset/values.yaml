global: {}

opentelemetry-collector:
  mode: daemonset

  # Headless Service exposing the node-local agent's OTLP receiver at a stable in-cluster DNS name
  # (otel-collector-daemonset-opentelemetry-collector.<ns>.svc:4317 grpc / :4318 http) so the engine,
  # cdc controllers and app components can export OTLP -> ClickHouse without needing per-node
  # status.hostIP (the core-provider otel.endpoint is a literal string, not a downward-API ref).
  # clusterIP: None keeps it headless -> consumes no Service-CIDR address.
  service:
    enabled: true
    type: ClusterIP
    clusterIP: None

  image:
    repository: otel/opentelemetry-collector-contrib

  command:
    name: otelcol-contrib

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: [nodes/proxy, pods]
        verbs: [get, list, watch]

  presets:
    logsCollection:
      enabled: true
      includeCollectorLogs: false
    hostMetrics:
      enabled: true
    kubernetesAttributes:
      enabled: true
      extractAllPodLabels: true
    kubeletMetrics:
      enabled: true

  config:
    receivers:
      filelog:
        operators:
          - id: container-parser
            max_log_size: 102400
            type: container
          - id: recombine-multiline
            type: recombine
            combine_field: body
            combine_with: "\n"
            is_first_entry: 'body not matches "^  " and body not matches "^}"'
            source_identifier: attributes["log.file.path"]
            max_unmatched_batch_size: 100
            overwrite_with: oldest

      hostmetrics:
        collection_interval: 60s

      kubeletstats:
        collection_interval: 60s
        auth_type: serviceAccount
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metrics:
          k8s.pod.cpu_limit_utilization:
            enabled: true
          k8s.pod.cpu_request_utilization:
            enabled: true
          k8s.pod.memory_limit_utilization:
            enabled: true
          k8s.pod.memory_request_utilization:
            enabled: true
          k8s.pod.uptime:
            enabled: true
          k8s.node.uptime:
            enabled: true
          k8s.container.cpu_limit_utilization:
            enabled: true
          k8s.container.cpu_request_utilization:
            enabled: true
          k8s.container.memory_limit_utilization:
            enabled: true
          k8s.container.memory_request_utilization:
            enabled: true
          container.uptime:
            enabled: true

    processors:
      transform:
        log_statements:
          - context: log
            statements:
              - 'replace_pattern(body, "\\x1b\\[[0-9;]*[mGKHFABCDsu]", "")'
              - 'set(attributes["krateo.io/composition-id"], resource.attributes["k8s.pod.labels.krateo.io/composition-id"]) where resource.attributes["k8s.pod.labels.krateo.io/composition-id"] != nil'
      batch:
        send_batch_size: 10000
        timeout: 5s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25

    exporters:
      clickhouse:
        endpoint: "tcp://krateo-clickstack-clickhouse-clickhouse-headless.krateo-system.svc:9000"
        username: "${env:CH_USERNAME}"
        password: "${env:CH_PASSWORD}"
        database: default
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        metrics_table_name: otel_metrics
        # create_schema:true so this node-local agent owns otel_traces creation (idempotent
        # CREATE IF NOT EXISTS; otel_logs/otel_metrics already exist). Required by the traces
        # pipeline below — the gateway has create_schema:true but no traces pipeline, so
        # without this nothing ever creates otel_traces. KOS-1 #112 bug #1.
        create_schema: true
        # RETENTION — DO NOT REMOVE. Incident 2026-07: with no TTL the otel_* tables grew
        # unbounded and filled the 10Gi ClickHouse volume in 8 days → every insert failed
        # with code 243 (NOT_ENOUGH_SPACE) → this collector buffered and OOM-crash-looped →
        # telemetry dead. ttl: 168h stamps a native 7-day TTL into the CREATE TABLE the
        # exporter issues, so FRESH installs are bounded from day one. NOTE: create_schema
        # is CREATE ... IF NOT EXISTS — this ttl only applies at table CREATION; tables that
        # already exist (e.g. the live bench) were fixed with a live
        # `ALTER TABLE ... MODIFY TTL` (7 days) and are untouched by this setting.
        # Disk-size sibling fixes: krateo-observability 0.1.9 (15Gi volume + 3-day
        # system-log ttl via cluster.spec.settings.extraConfig).
        ttl: 168h
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, transform, batch]
          exporters: [clickhouse]
        # KOS-1 #112 bug #2: wire OTLP metrics -> ClickHouse. The reconcile RED suite
        # (unstructured_runtime.reconcile.*) + the kagent GenAI token metrics arrive as OTLP on the
        # node-local agent's otlp receiver (same one the traces pipeline below uses); without it in
        # this pipeline they had no consumer and never reached otel_metrics_*.
        metrics:
          receivers: [hostmetrics, kubeletstats, otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [clickhouse]
        # KOS-1 #112 bug #1: wire OTLP traces -> ClickHouse. Apps/agents send OTLP spans to the
        # node-local agent (status.hostIP:4317 grpc / :4318 http, from chart-default otlp receiver);
        # previously the traces pipeline exported to debug only (chart default) so nothing landed
        # and otel_traces was never created. jaeger/zipkin receiver defaults stay defined-but-unused
        # (the collector ignores unreferenced receivers), so no need to null them.
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [clickhouse]

  extraEnvs:
    - name: CH_USERNAME
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: username
    - name: CH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: password

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
