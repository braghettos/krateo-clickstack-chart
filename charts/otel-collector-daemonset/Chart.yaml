apiVersion: v2
name: otel-collector-daemonset
description: >-
  Node-level OpenTelemetry collector (daemonset mode) for Krateo. Wraps the
  upstream opentelemetry-collector chart to collect pod logs, host metrics,
  kubelet metrics and OTLP traces and export them to ClickHouse.
type: application
version: 0.1.2
appVersion: "0.1.0"
dependencies:
  - name: opentelemetry-collector
    version: 0.158.1
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
home: https://krateo.io
icon: https://github.com/krateoplatformops/krateo/blob/main/docs/media/logo.svg
keywords:
  - krateo
  - platformops
  - opentelemetry
  - observability
sources:
  - https://github.com/braghettos/krateo-clickstack-chart
  - https://github.com/braghettos/krateo-otel-collector
