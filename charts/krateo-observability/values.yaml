# krateo-observability — ClickStack for Krateo observability, as a composition.
#
# The heavy upstream `clickstack` values live under the `clickstack:` key and are
# passed through verbatim. Helm's top-level `global` propagates into clickstack and
# all of its subcharts (clickhouse / otel / hyperdx / mongodb).

# storageClassName overrides the chart default (local-path) for GKE.
global:
  storageClassName: "standard-rwo"

# ---------------------------------------------------------------------------
# Krateo additions (rendered by this chart's own templates)
# ---------------------------------------------------------------------------
# NOTE: the GET /events?composition_id=<uid> ClickHouse HTTP handler (used by the
# portal events bell + the sse-proxy /notifications poller) is NO LONGER a separate
# ConfigMap mounted via clickstack.clickhouse.extraVolumes — that path is inert
# (upstream renders only cluster.spec) and the file-mount crashlooped on kind. It now
# lives natively in clickstack.clickhouse.cluster.spec.settings.extraConfig.http_handlers
# (see below), which the clickhouse.com operator merges into config.d/.

# Credentials Secret for the OTel collectors (otel-clickhouse-credentials).
# Created in THIS release's namespace (krateo-system) — the same namespace the
# collector pods run in, so no cross-namespace replication is needed.
# username/password must match the ClickStack ClickHouse `otelcollector` user
# (clickstack provisions it via extraUsersConfig with this same password).
otelCredentials:
  enabled: true
  secretName: otel-clickhouse-credentials
  username: otelcollector
  password: otelcollectorpass

# HyperDX external access. The upstream chart only emits a ClusterIP Service
# (krateo-clickstack-app); this renders an ADDITIONAL LoadBalancer Service so the
# UI is reachable without an imperative `kubectl patch` (no hardcoded IP — the
# cloud assigns one).
hyperdxLoadBalancer:
  enabled: true
  name: krateo-clickstack-app-lb
  port: 3000

# ---------------------------------------------------------------------------
# Upstream clickstack passthrough (verbatim from obs-stack/clickstack/values.yaml)
# ---------------------------------------------------------------------------
clickstack:
  # Stable resource names regardless of the Helm release name. Krateo's core-provider
  # installs a composition's release as "<composition-name>-<random>", so without this
  # the ClickHouse/Keeper/Mongo Services would be named after that random release name
  # and the otel-collector / mcp / sse-proxy references (which expect
  # krateo-clickstack-clickhouse-clickhouse-headless) would not resolve.
  fullnameOverride: krateo-clickstack

  clickhouse:
    enabled: true
    # IMPORTANT: upstream clickstack 3.0.0 renders ONLY `clickhouse.cluster.spec` into the
    # ClickHouseCluster CR (templates/clickhouse/cluster.yaml: `tpl (toYaml
    # .Values.clickhouse.cluster.spec)`) and references NONE of the top-level clickhouse.*
    # keys. So container resources MUST live under cluster.spec.containerTemplate.resources
    # to take effect; the old top-level `resources:` here was INERT (ClickHouse ran at the
    # operator default ~1Gi and the bell /notifications poller OOMed — MEMORY_LIMIT_EXCEEDED).
    cluster:
      spec:
        containerTemplate:
          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: "1"
              memory: 2Gi
        # ClickHouse server config merged into /etc/clickhouse-server/config.d/ by the
        # clickhouse.com operator. The GET /events?composition_id=<uid> handler MUST be
        # registered here, NOT via clickhouse.extraVolumes (see below): a predefined HTTP
        # handler is the ONLY supported way to serve /events — the portal events bell and
        # the sse-proxy /notifications poller both call this endpoint; the raw native-SQL /
        # dynamic-query API path is intentionally not used.
        #
        # Why extraConfig and not a mounted ConfigMap file:
        #   - upstream clickstack 3.0.0 renders ONLY clickhouse.cluster.spec into the
        #     ClickHouseCluster CR (templates/clickhouse/cluster.yaml does
        #     `tpl (toYaml .Values.clickhouse.cluster.spec)`), so clickhouse.extraVolumes /
        #     extraVolumeMounts are NEVER read — the old clickhouse-http-handlers ConfigMap
        #     was a dead object and /events 404'd;
        #   - the clickhouse.com ClickHouseCluster CRD has no extraVolumes field anyway —
        #     volumes go under cluster.spec.podTemplate.volumes + containerTemplate.volumeMounts;
        #   - and a subPath file-mount into config.d/ crashloops the pod on kind/containerd
        #     ("not a directory").
        # settings.extraConfig is the operator-native merge point: the operator writes it into
        # config.d/ (as YAML, which ClickHouse loads natively). A YAML list under `rule` renders
        # to repeated <rule> elements. The /ping, /replicas_status, /metrics and the catch-all `/`
        # dynamic_query_handler rules are required: once http_handlers is defined ClickHouse stops
        # serving its default routes, so the operator probes + native query API must be re-declared.
        settings:
          extraConfig:
            http_handlers:
              rule:
                # GET /events?composition_id=<uid>
                # The compositionresolver OTel processor enriches each K8s event with
                # LogAttributes['krateo.io/composition-id'] (composition resource UID).
                - url: "/events"
                  methods: "GET"
                  handler:
                    type: predefined_query_handler
                    query: |
                      SELECT
                          ifNull(JSONExtractString(Body, 'object', 'involvedObject', 'name'), '')      AS obj_name,
                          ifNull(JSONExtractString(Body, 'object', 'involvedObject', 'namespace'), '') AS obj_namespace,
                          ifNull(JSONExtractString(Body, 'object', 'involvedObject', 'uid'), '')       AS obj_uid,
                          ifNull(JSONExtractString(Body, 'object', 'involvedObject', 'kind'), '')      AS obj_kind,
                          ifNull(JSONExtractString(Body, 'object', 'reason'), '')                      AS reason,
                          ifNull(JSONExtractString(Body, 'object', 'message'), '')                     AS message,
                          ifNull(JSONExtractString(Body, 'object', 'type'), 'Normal')                  AS type,
                          coalesce(
                              nullIf(JSONExtractString(Body, 'object', 'eventTime'), ''),
                              nullIf(JSONExtractString(Body, 'object', 'lastTimestamp'), ''),
                              formatDateTime(toDateTime(Timestamp), '%Y-%m-%dT%H:%i:%SZ', 'UTC')
                          )                                                                             AS eventTime,
                          ifNull(JSONExtractString(Body, 'object', 'source', 'component'), '')         AS source_component
                      FROM otel_logs
                      WHERE ResourceAttributes['telemetry.source'] = 'k8s-events'
                        AND LogAttributes['krateo.io/composition-id'] = {composition_id:String}
                        AND JSONExtractString(Body, 'object', 'reason') != ''
                      ORDER BY Timestamp DESC
                      LIMIT 50
                      FORMAT JSON
                - url: "/ping"
                  handler:
                    type: static
                    status: 200
                    content_type: "text/plain; charset=UTF-8"
                    response_content: "Ok.\n"
                - url: "/replicas_status"
                  handler:
                    type: replicas_status
                - url: "/metrics"
                  handler:
                    type: prometheus
                - url: "/"
                  methods: "GET,POST"
                  handler:
                    type: dynamic_query_handler
                    query_param_name: query
    # STILL INERT (same wrong-path bug): upstream ignores these top-level keys. NOT moved to
    # cluster.spec on purpose — applying them live = ClickHouse version upgrade (25.7->26.3)
    # + PVC resize (10Gi->50Gi), a deliberate change that must not ride along with the memory
    # fix. To realize later: image -> cluster.spec.containerTemplate.image; size ->
    # cluster.spec.dataVolumeClaimSpec.resources.requests.storage.
    image: "clickhouse/clickhouse-server:26.3-alpine"
    persistence:
      enabled: true
      size: 50Gi

  otel:
    enabled: true
    resources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  # Disable ClickStack/HyperDX's bundled OpAMP otel-collector (opentelemetry-collector
  # subchart). It crashlooped (exit 2): the image runs in OpAMP supervisor mode, ignores the
  # chart's --config relay.yaml (debug-only, no ClickHouse exporter), and HyperDX's OpAMP
  # server never pushes a working config. REDUNDANT here -- Krateo's own otel-collector
  # daemonset + the compositionresolver deployment do the real ClickHouse ingestion (with
  # krateo.io/composition-id). HyperDX still reads from ClickHouse, which they populate.
  otel-collector:
    enabled: false

  hyperdx:
    enabled: true
    ingress:
      enabled: false

  mongodb:
    enabled: true
    persistence:
      size: 10Gi
    # #93: reap the MongoDB PVCs (data + logs) on teardown. The mongodb-community operator
    # passes spec.statefulSet.spec through to its StatefulSet (x-kubernetes-preserve-unknown-fields),
    # so we can set the GA StatefulSet PVC retention policy directly (unlike the ClickHouse operator,
    # which exposes no such field — hence the pvcReaper hook below for CH/Keeper).
    spec:
      statefulSet:
        spec:
          persistentVolumeClaimRetentionPolicy:
            whenDeleted: Delete
            whenScaled: Retain
# NOTE (#93): the ClickHouse/Keeper orphaned-PVC reaper is NOT a chart hook — a composition-chart
# post-delete hook doesn't run reliably (cdc uninstall) and would race the operator's async STS
# teardown. It lives in the installer's ordered-teardown pre-delete path instead (installer >= 0.2.191).
# Only MongoDB's PVC retention (above) is chart-level, because its operator passes spec.statefulSet through.