apiVersion: v2
name: krateo-observability
description: >-
  ClickStack (ClickHouse + OTel gateway + HyperDX + MongoDB) for the Krateo
  observability stack, packaged as a Krateo composition. Wraps the upstream
  clickstack chart and folds in the ClickHouse HTTP-handlers ConfigMap, the
  otel-clickhouse credentials Secret, and a HyperDX LoadBalancer Service.
  Replaces obs-stack install.sh phases 1, 2, 2b and 2c (no imperative kubectl).
type: application
# 0.1.3: bump to make the ClickHouse 8Gi/2Gi (image 26.3-alpine, 50Gi) resourcing
# change a REAL, immutable version. 0.1.2 had been mutably overwritten with 8Gi at a
# later repo tag, but consumers (core-provider/helm) cache by version tag and never
# re-pull an unchanged version — so live ClickHouse stayed at the old 1Gi and OOMed
# the sse-proxy /notifications query. A version bump forces the re-pull.
# 0.1.6: move the GET /events?composition_id=<uid> handler from the (inert) clickhouse-http-handlers
# ConfigMap + clickhouse.extraVolumes mount into cluster.spec.settings.extraConfig.http_handlers.
# The mount was never applied (upstream renders only cluster.spec; the clickhouse.com CRD has no
# extraVolumes field; subPath into config.d/ also crashloops on kind) so /events 404'd and the only
# path that worked was the forbidden raw native-SQL/dynamic-query API. New version forces the re-pull.
# 0.1.9: durable retention fix. The 10Gi data volume filled in 8 days (no TTL anywhere: otel_*
# tables unbounded + ClickHouse system log tables unbounded ~3.6GiB) → inserts failed with
# code 243 → the OTel collectors OOM-crash-looped → telemetry dead. Now: dataVolumeClaimSpec
# 15Gi (matches the live relief) + 3-day system-log ttl (query_log/text_log/metric_log/part_log/
# asynchronous_metric_log/trace_log) via settings.extraConfig. Pairs with otel-collector-daemonset
# 0.1.5 + otel-collector-deployment 0.3.3 (clickhouse exporter ttl: 168h on the otel_* tables).
version: 0.1.9
appVersion: "3.0.0"
dependencies:
  - name: clickstack
    version: "3.0.0"
    repository: https://clickhouse.github.io/ClickStack-helm-charts
home: https://krateo.io
icon: https://raw.githubusercontent.com/krateoplatformops/krateo/main/docs/media/logo.svg
keywords:
  - krateo
  - platformops
  - clickstack
  - observability
  - clickhouse
  - opentelemetry
annotations:
  krateo.io/category: observability
  krateo.io/maturity: beta
  krateoSupportedVersion: ">= 2.5.1"
sources:
  - https://github.com/braghettos/krateo-clickstack-chart