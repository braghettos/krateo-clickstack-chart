{{- /*
  ClickHouse credentials secrets.

  Ported from observability-stack/clickhouse-config/otel-credentials-secret.yaml.
  - otel-clickhouse-credentials lives in the ClickHouse namespace and is consumed
    by the OTel collectors.
  - mcp-clickhouse-credentials lives in the Krateo namespace and is consumed by
    the MCP server.
  Names are kept EXACTLY as the obs-stack uses them. Namespaces come from values.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: otel-clickhouse-credentials
  namespace: {{ .Values.namespaces.clickhouse }}
  labels:
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: krateo-observability-stack
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  username: otelcollector
  password: otelcollectorpass
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-clickhouse-credentials
  namespace: {{ .Values.namespaces.krateo }}
  labels:
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  username: default
  password: ""
