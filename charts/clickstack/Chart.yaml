apiVersion: v2
name: clickstack
description: >-
  Krateo blueprint wrapper for ClickStack (ClickHouse + HyperDX + OpenTelemetry).
  Depends on the upstream ClickStack chart and applies the Krateo observability
  customizations (clickhouse-server image, http-handlers, OTel credentials,
  configurable HyperDX exposure).

# A chart can be either an 'application' or a 'library' chart.
type: application

# This is the wrapper chart version. Substituted from CHART_VERSION by the
# release-oci workflow at tag time. Locally set to 3.0.0 for validation.
version: CHART_VERSION

# Version of the application being deployed (HyperDX / ClickStack app version).
appVersion: "2.27.0"

dependencies:
  - name: clickstack
    alias: clickstack
    version: "3.0.0"
    repository: https://clickhouse.github.io/ClickStack-helm-charts
