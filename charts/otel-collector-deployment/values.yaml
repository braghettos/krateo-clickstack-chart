global: {}

# Prometheus -> OTLP bridge gate (KOS-1: Prometheus-only /metrics -> ClickHouse).
# Several components expose metrics ONLY as Prometheus /metrics scrape endpoints
# (NOT OTLP), so they never reach the ClickHouse otel_metrics_* tables. The
# `prometheus` receiver below (opentelemetry-collector.config.receivers.prometheus)
# scrapes them via kubernetes_sd_configs (pod role) and feeds the existing metrics
# pipeline -> clickhouse exporter.
#
# DEFAULT-OFF / ADDITIVE: with `enabled: false` the prometheus receiver is defined
# but is NOT wired into the metrics pipeline (the upstream collector ignores any
# receiver that no pipeline references, exactly as it already does for the unused
# jaeger/zipkin defaults), so a default install is byte-unchanged and performs no
# scraping. To enable the bridge, set `enabled: true` AND add `prometheus` to
# opentelemetry-collector.config.service.pipelines.metrics.receivers (see comments
# there). The flag is the single documented switch for the bridge.
#
# TARGET COMPONENTS must actually expose a Prometheus /metrics endpoint and carry
# the standard scrape annotations for the pod-SD job to find them:
#   prometheus.io/scrape: "true"
#   prometheus.io/port:   "<metrics-port>"   (e.g. 8080 / 8085 / 9363)
#   prometheus.io/path:   "/metrics"          (optional; defaults to /metrics)
# Component-side dependency (these are OTLP-less today):
#   - kagent-tools                     -> :8085  /metrics
#   - ClickHouse server internal       -> :9363  /metrics (prometheus port enabled)
#   - controller-runtime controllers   -> :8080  /metrics; the kagent controller
#     needs --metrics-bind-address set (and the runtime controllers need their
#     metrics port enabled) before the scrape yields any data.
# (The engine reconcile-throughput suite already has an OTLP path via
# provider-/unstructured-runtime; its Prometheus families are a legacy duplicate.)
collector:
  prometheusScrape:
    enabled: false

opentelemetry-collector:
  mode: deployment

  replicaCount: 1

  image:
    # Renamed otelcol-krateo -> krateo-otel-collector when the custom collector was split
    # into its own single-image repo (braghettos/krateo-otel-collector) on the canonical CI.
    repository: ghcr.io/braghettos/krateo-otel-collector
    # 1.0.1: patched k8sobjectsreceiver (recycle timer + restart-on-close) — KOS-1 #112 bug #2
    tag: "1.0.1"
    pullPolicy: IfNotPresent

  # The container binary is still named otelcol-krateo (OTel builder dist.name / Dockerfile
  # ENTRYPOINT); only the published image repository was renamed to krateo-otel-collector.
  command:
    name: otelcol-krateo

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: [events, namespaces, nodes, pods, replicationcontrollers,
                    resourcequotas, services, endpoints]
        verbs: [get, list, watch]
      - apiGroups: [apps]
        resources: [daemonsets, deployments, replicasets, statefulsets]
        verbs: [get, list, watch]
      - apiGroups: [batch]
        resources: [jobs, cronjobs]
        verbs: [get, list, watch]
      - apiGroups: [autoscaling]
        resources: [horizontalpodautoscalers]
        verbs: [get, list, watch]
      - apiGroups: ["composition.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["templates.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["widgets.templates.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["deployment.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["core.krateo.io"]
        resources: ["*"]
        verbs: [get]

  presets:
    kubernetesAttributes:
      enabled: false
    kubernetesEvents:
      enabled: false
    clusterMetrics:
      enabled: false

  config:
    receivers:
      jaeger: null
      otlp: null
      zipkin: null
      # Prometheus -> OTLP bridge receiver (gated by collector.prometheusScrape.enabled;
      # see the top-of-file comment). Defined here but INERT until added to the metrics
      # pipeline below, so a default install does no scraping. Discovers pods via the
      # Kubernetes API (pod role) and scrapes only those carrying prometheus.io/scrape:
      # "true", honouring the standard prometheus.io/port and prometheus.io/path
      # annotations. Scraped samples flow through the metrics pipeline to the existing
      # clickhouse exporter -> otel_metrics_* tables.
      prometheus:
        config:
          scrape_configs:
            - job_name: krateo-pod-annotations
              scrape_interval: 60s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Keep only pods annotated prometheus.io/scrape: "true".
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                  action: keep
                  regex: "true"
                # Honour prometheus.io/path (default /metrics).
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # Honour prometheus.io/port: rewrite the scrape address host:port.
                - source_labels:
                    - __address__
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $$1:$$2
                  target_label: __address__
                # Surface namespace / pod / node as labels for downstream attribution.
                - source_labels:
                    - __meta_kubernetes_namespace
                  action: replace
                  target_label: k8s_namespace_name
                - source_labels:
                    - __meta_kubernetes_pod_name
                  action: replace
                  target_label: k8s_pod_name
                - source_labels:
                    - __meta_kubernetes_pod_node_name
                  action: replace
                  target_label: k8s_node_name
      k8sobjects:
        objects:
          - name: events
            mode: watch
            group: ""
            namespaces: []
      k8s_cluster:
        collection_interval: 60s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, ephemeral-storage]

    processors:
      batch:
        send_batch_size: 10000
        timeout: 5s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 75
        spike_limit_percentage: 20
      k8sattributes:
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.replicaset.name
            - k8s.job.name
            - k8s.cronjob.name
          labels:
            - tag_name: $$1
              key_regex: (.*)
              from: pod
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource:
        attributes:
          - key: telemetry.source
            value: "k8s-events"
            action: insert
      compositionresolver:
        cache_ttl: 5m
        negative_cache_ttl: 30s
        label_key: "krateo.io/composition-id"

    exporters:
      clickhouse:
        endpoint: "tcp://krateo-clickstack-clickhouse-clickhouse-headless.krateo-system.svc:9000"
        username: "${env:CH_USERNAME}"
        password: "${env:CH_PASSWORD}"
        database: default
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        metrics_table_name: otel_metrics
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      pipelines:
        logs:
          receivers: [k8sobjects]
          processors: [memory_limiter, k8sattributes, resource, compositionresolver, batch]
          exporters: [clickhouse]
        # To enable the Prometheus -> OTLP bridge (collector.prometheusScrape.enabled),
        # add `prometheus` to the receivers list below, i.e.:
        #   receivers: [k8s_cluster, prometheus]
        # The prometheus receiver is defined under config.receivers but stays inert
        # while it is absent from this list, keeping the default install unchanged.
        metrics:
          receivers: [k8s_cluster]
          processors: [memory_limiter, batch]
          exporters: [clickhouse]
        traces: null

  extraEnvs:
    - name: CH_USERNAME
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: username
    - name: CH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: password

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
