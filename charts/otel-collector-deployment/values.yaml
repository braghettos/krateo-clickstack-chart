global: {}

# Prometheus -> OTLP bridge (KOS-1: Prometheus-only /metrics -> ClickHouse).
# Several components expose metrics ONLY as Prometheus /metrics scrape endpoints (NOT OTLP),
# so they never reach the ClickHouse otel_metrics_* tables. A `prometheus` receiver could
# scrape them via kubernetes_sd_configs (pod role) and feed the metrics pipeline.
#
# STATUS: the bridge is NOT usable with the default (minimal) krateo-otel-collector image,
# which does not compile in the prometheus receiver. The receiver is therefore nulled in
# config.receivers below (see the detailed note there) — a default install runs clean.
# Enabling it is a THREE-part change, not a one-flag switch (see that note):
#   (1) a collector image built WITH the prometheus receiver,
#   (2) restore the receiver config, and
#   (3) add `prometheus` to the metrics pipeline.
# `prometheusScrape.enabled` below is a MARKER only — it does NOT wire anything on its own
# (a values-only wrapper around the upstream opentelemetry-collector chart cannot
# conditionally omit a nested receiver key; the fix instead nulls the receiver by default).
#
# TARGET COMPONENTS (OTLP-less today) that the bridge would scrape once enabled — they must
# expose /metrics and carry prometheus.io/scrape|port|path annotations:
#   - kagent-tools                     -> :8085  /metrics
#   - ClickHouse server internal       -> :9363  /metrics
#   - controller-runtime controllers   -> :8080  /metrics (needs --metrics-bind-address)
# (The engine reconcile-throughput suite already has an OTLP path via
# provider-/unstructured-runtime; its Prometheus families are a legacy duplicate.)
collector:
  prometheusScrape:
    # MARKER ONLY — does not enable the bridge by itself (see the note above and at
    # config.receivers.prometheus). Enabling requires a prometheus-capable collector image.
    enabled: false

opentelemetry-collector:
  mode: deployment

  replicaCount: 1

  image:
    # Renamed otelcol-krateo -> krateo-otel-collector when the custom collector was split
    # into its own single-image repo (braghettos/krateo-otel-collector) on the canonical CI.
    repository: ghcr.io/braghettos/krateo-otel-collector
    # 1.0.2: + patched clickhouseexporter — recreate the otel_* schema and retry on UNKNOWN_TABLE
    #        (ClickHouse re-provisioned with a fresh DB) instead of dropping data until a restart.
    # 1.0.1: patched k8sobjectsreceiver (recycle timer + restart-on-close) — KOS-1 #112 bug #2
    tag: "1.0.2"
    pullPolicy: IfNotPresent

  # The container binary is still named otelcol-krateo (OTel builder dist.name / Dockerfile
  # ENTRYPOINT); only the published image repository was renamed to krateo-otel-collector.
  command:
    name: otelcol-krateo

  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: [events, namespaces, nodes, pods, replicationcontrollers,
                    resourcequotas, services, endpoints]
        verbs: [get, list, watch]
      - apiGroups: [apps]
        resources: [daemonsets, deployments, replicasets, statefulsets]
        verbs: [get, list, watch]
      - apiGroups: [batch]
        resources: [jobs, cronjobs]
        verbs: [get, list, watch]
      - apiGroups: [autoscaling]
        resources: [horizontalpodautoscalers]
        verbs: [get, list, watch]
      - apiGroups: ["composition.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["templates.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["widgets.templates.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["deployment.krateo.io"]
        resources: ["*"]
        verbs: [get]
      - apiGroups: ["core.krateo.io"]
        resources: ["*"]
        verbs: [get]

  presets:
    kubernetesAttributes:
      enabled: false
    kubernetesEvents:
      enabled: false
    clusterMetrics:
      enabled: false

  config:
    receivers:
      jaeger: null
      otlp: null
      zipkin: null
      # Prometheus -> OTLP bridge receiver — NULLED by default (like jaeger/otlp/zipkin above).
      #
      # WHY null and not just "declared but inert": the OTel Collector validates the TYPE of
      # EVERY declared receiver at config load, used by a pipeline or not. The minimal
      # krateo-otel-collector image (builder-config.yaml) compiles in ONLY k8sobjects +
      # k8s_cluster — it has NO prometheus receiver — so merely DECLARING `prometheus` here
      # yields `unknown type: "prometheus"` and a CrashLoopBackOff on every default install.
      # (jaeger/zipkin are safe to declare-and-ignore only because they ARE compiled into
      # standard collector images; prometheus is not in this one — that was the wrong
      # assumption behind the old prometheusScrape "gate".)
      #
      # To enable the Prometheus -> OTLP bridge you MUST:
      #   (1) run a collector image BUILT WITH the prometheus receiver
      #       (add receiver/prometheusreceiver to krateo-otel-collector/builder-config.yaml),
      #   (2) replace this `null` with the krateo-pod-annotations scrape config (preserved
      #       commented below for reference), and
      #   (3) add `prometheus` to service.pipelines.metrics.receivers.
      prometheus: null
      # prometheus:
      #   config:
      #     scrape_configs:
      #       - job_name: krateo-pod-annotations
      #         scrape_interval: 60s
      #         kubernetes_sd_configs:
      #           - role: pod
      #         relabel_configs:
      #           # Keep only pods annotated prometheus.io/scrape: "true".
      #           - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      #             action: keep
      #             regex: "true"
      #           # Honour prometheus.io/path (default /metrics).
      #           - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
      #             action: replace
      #             target_label: __metrics_path__
      #             regex: (.+)
      #           # Honour prometheus.io/port: rewrite the scrape address host:port.
      #           - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
      #             action: replace
      #             regex: ([^:]+)(?::\d+)?;(\d+)
      #             replacement: $$1:$$2
      #             target_label: __address__
      #           # Surface namespace / pod / node as labels for downstream attribution.
      #           - source_labels: [__meta_kubernetes_namespace]
      #             action: replace
      #             target_label: k8s_namespace_name
      #           - source_labels: [__meta_kubernetes_pod_name]
      #             action: replace
      #             target_label: k8s_pod_name
      #           - source_labels: [__meta_kubernetes_pod_node_name]
      #             action: replace
      #             target_label: k8s_node_name
      k8sobjects:
        objects:
          - name: events
            mode: watch
            group: ""
            namespaces: []
      k8s_cluster:
        collection_interval: 60s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, ephemeral-storage]

    processors:
      batch:
        send_batch_size: 10000
        timeout: 5s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 75
        spike_limit_percentage: 20
      k8sattributes:
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.replicaset.name
            - k8s.job.name
            - k8s.cronjob.name
          labels:
            - tag_name: $$1
              key_regex: (.*)
              from: pod
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource:
        attributes:
          - key: telemetry.source
            value: "k8s-events"
            action: insert
      compositionresolver:
        cache_ttl: 5m
        negative_cache_ttl: 30s
        label_key: "krateo.io/composition-id"

    exporters:
      clickhouse:
        endpoint: "tcp://krateo-clickstack-clickhouse-clickhouse-headless.krateo-system.svc:9000"
        username: "${env:CH_USERNAME}"
        password: "${env:CH_PASSWORD}"
        database: default
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        metrics_table_name: otel_metrics
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      pipelines:
        logs:
          receivers: [k8sobjects]
          processors: [memory_limiter, k8sattributes, resource, compositionresolver, batch]
          exporters: [clickhouse]
        # To enable the Prometheus -> OTLP bridge: restore the prometheus receiver (nulled by
        # default under config.receivers — requires a prometheus-capable collector image) and
        # add it here, i.e. receivers: [k8s_cluster, prometheus].
        metrics:
          receivers: [k8s_cluster]
          processors: [memory_limiter, batch]
          exporters: [clickhouse]
        traces: null

  extraEnvs:
    - name: CH_USERNAME
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: username
    - name: CH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: otel-clickhouse-credentials
          key: password

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
