apiVersion: v2
name: otel-collector-deployment
description: >-
  Cluster-level OpenTelemetry collector (deployment mode) for Krateo. Wraps the
  upstream opentelemetry-collector chart with a custom otelcol-krateo image that
  enriches K8s events with krateo.io/composition-id and exports to ClickHouse.
type: application
version: 0.3.1
appVersion: "1.0.1"
dependencies:
  - name: opentelemetry-collector
    version: 0.158.1
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
home: https://krateo.io
icon: https://github.com/krateoplatformops/krateo/blob/main/docs/media/logo.svg
keywords:
  - krateo
  - platformops
  - opentelemetry
  - observability
sources:
  - https://github.com/braghettos/krateo-clickstack-chart
  - https://github.com/braghettos/krateo-otel-collector
