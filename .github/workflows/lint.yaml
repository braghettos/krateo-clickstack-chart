# Canonical Krateo chart-repo lint workflow. PR-time validation for every chart:
# helm lint, values.schema.json well-formedness, and a render smoke test. Same file
# across all krateo-*-chart repos (charts live under charts/*, or a single chart/).
name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Discover chart directories
        id: charts
        run: |
          set -euo pipefail
          if [ -d charts ]; then
            dirs=$(find charts -maxdepth 2 -name Chart.yaml -printf '%h\n')
          else
            dirs=chart
          fi
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "${dirs}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Lint, validate schema, render
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::${dir}"
            # Placeholder versions used by the release workflow must not break lint.
            sed -i 's/CHART_VERSION/0.0.0/g; s/APP_VERSION/0.0.0/g' "${dir}/Chart.yaml"
            if [ -f "${dir}/values.schema.json" ]; then
              python3 -c "import json,sys; json.load(open('${dir}/values.schema.json'))" \
                && echo "values.schema.json: valid JSON" || { echo "values.schema.json: INVALID"; fail=1; }
            fi
            if grep -q '^dependencies:' "${dir}/Chart.yaml"; then
              helm dependency build "${dir}" >/dev/null 2>&1 || helm dependency update "${dir}" >/dev/null 2>&1 || true
            fi
            helm lint "${dir}" || fail=1
            helm template smoke "${dir}" >/dev/null || fail=1
            echo "::endgroup::"
          done <<< "${{ steps.charts.outputs.dirs }}"
          exit $fail
