# Publishes every chart under charts/* to the consolidated Krateo OCI registry
# (oci://ghcr.io/braghettos/krateo) on a semver tag push. Each chart is packaged
# at the version declared in its own Chart.yaml; charts that still carry the
# CHART_VERSION / APP_VERSION placeholders (e.g. clickstack) get the tag value
# substituted so they track the repo tag, while independently-pinned charts
# (otel-collector-*, krateo-sse-proxy) keep their own versions.
name: release-oci

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  packages: write

env:
  OCI_REPO: oci://ghcr.io/braghettos/krateo

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push charts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p .packaged
          for dir in charts/*/; do
            name="$(basename "$dir")"
            echo "::group::Releasing chart ${name}"
            # Substitute placeholders for tag-tracked charts (no-op when absent).
            sed -i "s/CHART_VERSION/${VERSION}/g; s/APP_VERSION/${VERSION}/g" "${dir}Chart.yaml"
            if grep -q '^dependencies:' "${dir}Chart.yaml"; then
              echo "Building dependencies for ${name}"
              helm dependency update "${dir}"
            fi
            helm package "${dir}" --destination .packaged
            pkg="$(ls .packaged/${name}-*.tgz | head -n1)"
            echo "Pushing ${pkg} to ${OCI_REPO}"
            helm push "${pkg}" "${OCI_REPO}"
            echo "::endgroup::"
          done
