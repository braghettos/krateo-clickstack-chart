apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-clickstack-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-clickstack-agent
    app.kubernetes.io/part-of: krateo-clickstack
spec:
  type: Declarative
  description: >-
    A read-only Krateo/Kubernetes observability troubleshooter that diagnoses issues by querying the
    ClickStack telemetry backend (ClickHouse + OTel collectors + HyperDX) — running SELECT queries over the
    otel_logs and otel_metrics_gauge/sum/histogram tables and inspecting live cluster state via k8s reads —
    grounded in braghettos/krateo-clickstack-chart (deployment/CRDs/wiring) and braghettos/krateo-otel-collector
    (internals) at the deployed chart tag.
  declarative:
    deployment:
      env:
{{- include "clickstack-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig.name }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: clickstack-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/clickstack_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          name: clickhouse-mcp-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - list_databases
            - list_tables
            - run_select_query
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_get_pod_logs
            - k8s_get_events
{{- if .Values.fetch.enabled }}
      # Tokenless doc grounding: GET the version-pinned raw docs/llms.txt URL (public, no auth/token).
      - type: McpServer
        mcpServer:
          name: {{ .Values.fetch.mcpServer }}
          kind: MCPServer
          apiGroup: kagent.dev
          toolNames:
            - fetch
{{- end }}
{{- if .Values.github.enabled }}
      - type: McpServer
        mcpServer:
          name: {{ .Values.github.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_file_contents
            - search_code
{{- end }}
    a2aConfig:
      skills:
        - id: troubleshoot-telemetry
          name: Troubleshoot via telemetry
          description: >-
            Diagnose Krateo/K8s issues by querying ClickStack telemetry in ClickHouse — pod logs, K8s Events,
            error spikes, crash-loops, restarts, and OOMKills.
          tags: [krateo, observability, clickhouse, otel, telemetry, troubleshooting]
          examples:
            - Why is this pod crash-looping? Check the telemetry.
            - Investigate the recent ERROR/FATAL spike for the frontend pods in the last hour.
            - Which pods got OOMKilled or restarted in krateo-system today?
            - Show me the Warning K8s Events from otel_logs for this namespace.
        - id: correlate-metrics-events
          name: Correlate metrics, logs and events
          description: >-
            Correlate otel_logs, K8s Events, and CPU/memory metrics across namespaces, pods, and
            compositions to build a full picture and suggest next steps.
          tags: [metrics, clickhouse, kubernetes, compositions, correlation]
          examples:
            - What are the top memory consumers in krateo-system right now?
            - Correlate the logs, events, and CPU/memory for a composition id and tell me what went wrong.
            - Cross-reference the restart spike with the pod logs and K8s events for this deployment.
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}
